name: 🔄 Zampto Auto Renew (Stable)

on:
  workflow_dispatch:
  schedule:
    - cron: "45 3,15 * * *"  # UTC: 03:45 / 15:45

permissions:
  contents: write

concurrency:
  group: zampto-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PROJECT_DIR: zampto
      SCRIPT_NAME: Zampto_Renew7.py

    steps:
      # =========================
      # 📥 1️⃣ 检出当前仓库
      # =========================
      - name: 📥 检出当前仓库
        uses: actions/checkout@v4

      # =========================
      # 🔐 2️⃣ 检出私有仓库
      # =========================
      - name: 🔐 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/zam-auto
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: workdir
          fetch-depth: 1

      # =========================
      # 📁 3️⃣ 创建目录
      # =========================
      - name: 📁 初始化目录
        run: |
          mkdir -p workdir/screenshots

      # =========================
      # 🐍 4️⃣ Python
      # =========================
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================
      # 📦 5️⃣ 系统依赖
      # =========================
      - name: 📦 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb unzip curl

      # =========================
      # 📚 6️⃣ Python 依赖
      # =========================
      - name: 📚 安装依赖
        run: |
          pip install --upgrade pip
          pip install seleniumbase pyvirtualdisplay requests

      # =========================
      # 📡 7️⃣ 启动代理（安全版）
      # =========================
      - name: 📡 启动代理
        env:
          PROXY_NODE: ${{ secrets.PROXY_NODE }}
        run: |
          if [ -z "$PROXY_NODE" ]; then
            echo "[INFO] 未配置代理"
            exit 0
          fi

          echo "[INFO] 安装 Xray..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip -d xray
          chmod +x xray/xray

          echo "[INFO] 写入最简配置（通用出口）"
          cat > config.json <<EOF
          {
            "inbounds": [{
              "port": 10808,
              "listen": "127.0.0.1",
              "protocol": "socks"
            }],
            "outbounds": [{
              "protocol": "freedom"
            }]
          }
          EOF

          ./xray/xray run -c config.json > xray.log 2>&1 &
          sleep 5

          if curl -x socks5://127.0.0.1:10808 -s https://api.ipify.org > /dev/null; then
            echo "PROXY_SOCKS5=socks5://127.0.0.1:10808" >> $GITHUB_ENV
            echo "[INFO] ✅ 代理启动成功"
          else
            echo "[WARN] ⚠️ 代理失败，走直连"
          fi

      # =========================
      # ⏳ 8️⃣ 随机延迟
      # =========================
      - name: ⏳ 随机延迟
        run: |
          sleep $((RANDOM % 120))

      # =========================
      # 🚀 9️⃣ 执行脚本
      # =========================
      - name: 🚀 执行续期
        env:
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_SOCKS5: ${{ env.PROXY_SOCKS5 }}
          SCREENSHOT_DIR: screenshots
        run: xvfb-run -a python ${{ env.SCRIPT_NAME }}
        working-directory: workdir

      # =========================
      # 📸 🔟 上传截图
      # =========================
      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: workdir/screenshots/
          if-no-files-found: ignore

      # =========================
      # 🗑️ 11 清理
      # =========================
      - name: 🗑️ 清理截图
        if: always()
        run: rm -rf workdir/screenshots/*

      # =========================
      # 🧹 12 清理运行记录
      # =========================
      - name: 🧹 清理旧运行
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1