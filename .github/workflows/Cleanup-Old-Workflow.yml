name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 3 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ 安装工具
      - name: Setup tools
        run: |
          sudo apt update
          sudo apt install -y gh jq

      # 3️⃣ 删除旧 Workflow Runs（仅保留最新一次）
      - name: Cleanup old workflow runs
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list \
            --workflow="${{ github.workflow }}" \
            --limit 100 \
            --json databaseId \
            --jq '.[].databaseId')

          count=0

          for run_id in $runs; do
            count=$((count + 1))

            if [ "$count" -gt 1 ]; then
              echo "Deleting run: $run_id"
              gh run delete "$run_id" || true
            fi
          done

      # 4️⃣ 清理 Artifacts 并生成日志
      - name: Clean artifacts + generate log
        run: |
          export GH_TOKEN=${{ github.token }}

          echo "📦 Cleaning artifacts older than 1 days..."

          cutoff=$(date -u -d "1 days ago" +%s)

          LOG_BODY=""

          artifacts=$(gh api repos/${{ github.repository }}/actions/artifacts --paginate --jq '.artifacts[] | "\(.id) \(.created_at)"')

          # 确保日志文件存在
          touch cleanup-log.txt

          if [ -z "$artifacts" ]; then
            LOG_BODY="• No artifacts found"
          else
            while read -r id created_at; do
              created_ts=$(date -d "$created_at" +%s)

              if [ "$created_ts" -lt "$cutoff" ]; then
                echo "Deleting artifact $id"
                gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id
                LOG_BODY="$LOG_BODY\n• Deleted artifact $id"
              fi
            done <<< "$artifacts"
          fi

          echo -e "$LOG_BODY" > cleanup-log.txt

      # 5️⃣ 更新 README
      - name: Update README
        run: |
          TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')

          {
            echo "### 🧹 Cleanup Log ($TIME)"
            echo
            cat cleanup-log.txt
          } > README.md

      # 6️⃣ 提交更改
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add README.md

          if ! git diff --cached --quiet; then
            git commit -m "🧹 Cleanup workflow runs & artifacts log"
            git push
          else
            echo "No changes to commit."
          fi