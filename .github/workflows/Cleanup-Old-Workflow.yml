name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 3 * * 5'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout
      - name: Checkout repo
        uses: actions/checkout@v4


      # 2️⃣ 安装工具
      - name: Setup tools
        run: |
          sudo apt update
          sudo apt install -y gh jq


      # 3️⃣ 调试信息
      - name: Debug GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "GitHub CLI:"
          gh --version

          echo
          echo "Repository:"
          echo "${{ github.repository }}"

          echo
          echo "Current Run:"
          echo "${{ github.run_id }}"


      # 4️⃣ 删除所有 Workflow Runs
      - name: Delete all workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "🗑️ Start deleting workflow runs..."

          while true; do

            runs=$(gh api \
              "repos/${{ github.repository }}/actions/runs?per_page=100" \
              --jq '.workflow_runs[] | select(.status != "in_progress") | .id')

            if [ -z "$runs" ]; then
              echo "No more workflow runs."
              break
            fi


            deleted=0


            while read -r run_id; do

              [ -z "$run_id" ] && continue


              # 防止误删当前运行
              if [ "$run_id" = "${{ github.run_id }}" ]; then
                echo "Skip current run: $run_id"
                continue
              fi


              echo "Deleting run: $run_id"


              if gh api \
                -X DELETE \
                "repos/${{ github.repository }}/actions/runs/$run_id"; then

                deleted=$((deleted + 1))

              fi


            done <<< "$runs"


            echo "Deleted $deleted runs."


            # 防止 API 异常导致死循环
            if [ "$deleted" -eq 0 ]; then
              echo "Nothing deleted, stopping."
              break
            fi


          done


          echo "✅ Workflow cleanup finished."


      # 5️⃣ 清理旧 Artifacts
      - name: Clean artifacts + generate log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "📦 Cleaning artifacts older than 7 days..."


          cutoff=$(date -u -d "7 days ago" +%s)

          LOG_BODY=""


          touch cleanup-log.txt


          artifacts=$(gh api \
            repos/${{ github.repository }}/actions/artifacts \
            --paginate \
            --jq '.artifacts[] | "\(.id) \(.created_at)"')


          if [ -z "$artifacts" ]; then

            LOG_BODY="• No artifacts found"


          else

            while read -r id created_at; do


              created_ts=$(date -d "$created_at" +%s)


              if [ "$created_ts" -lt "$cutoff" ]; then


                echo "Deleting artifact $id"


                gh api \
                  -X DELETE \
                  repos/${{ github.repository }}/actions/artifacts/$id


                LOG_BODY="$LOG_BODY\n• Deleted artifact $id"


              fi


            done <<< "$artifacts"

          fi


          echo -e "$LOG_BODY" > cleanup-log.txt



      # 6️⃣ 更新 README
      - name: Update README
        run: |
          TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')


          {
            echo "### 🧹 Cleanup Log ($TIME)"
            echo
            cat cleanup-log.txt
          } > README.md



      # 7️⃣ 提交 README
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"


          git add README.md


          if git diff --cached --quiet; then

            echo "No changes to commit."

          else

            git commit \
              -m "🧹 Cleanup workflow runs & artifacts log"

            git push

          fi